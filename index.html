<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deformation Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            padding: 0;
            overflow: hidden;
        }

        .slider-container {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            z-index: 10;
            background-color: rgb(255, 255, 255);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid black;
        }

        /* Label for sliders */
        .slider-container label {
            font-size: 30px;
            margin-bottom: 5px;
        }

        /* Slider element */
        .slider-container input[type="range"] {
            width: 400px;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="slider-container">
        <label id="label1" for="slider1">r = 5</label>
        <input type="range" autocomplete="off" id="slider1" min="1" max="40" value="5">
        <label id="label2" for="slider2">a = 2</label>
        <input type="range" autocomplete="off" id="slider2" min="1" max="40" value="2">
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
